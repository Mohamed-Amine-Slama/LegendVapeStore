<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 640" width="480" height="640">
  <defs>
    <!-- Premium body -->
    <linearGradient id="fh-body" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#F2D9A8"/>
      <stop offset="0.35" stop-color="#C8A96E"/>
      <stop offset="0.55" stop-color="#A88848"/>
      <stop offset="1" stop-color="#3A2C12"/>
    </linearGradient>
    <linearGradient id="fh-shine" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="rgba(255,255,255,0.55)"/>
      <stop offset="0.5" stop-color="rgba(255,255,255,0.05)"/>
      <stop offset="1" stop-color="rgba(255,255,255,0)"/>
    </linearGradient>
    <radialGradient id="fh-vapor" cx="0.5" cy="0.5" r="0.55">
      <stop offset="0" stop-color="rgba(255,255,255,0.85)"/>
      <stop offset="0.45" stop-color="rgba(220,225,240,0.45)"/>
      <stop offset="1" stop-color="rgba(60,80,120,0)"/>
    </radialGradient>
    <radialGradient id="fh-glow" cx="0.5" cy="0.7" r="0.6">
      <stop offset="0" stop-color="rgba(232,200,74,0.35)"/>
      <stop offset="1" stop-color="rgba(200,169,110,0)"/>
    </radialGradient>
    <filter id="fh-blur" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="14"/>
    </filter>
  </defs>

  <!-- Backlit halo -->
  <ellipse cx="240" cy="420" rx="220" ry="60" fill="url(#fh-glow)" filter="url(#fh-blur)"/>

  <!-- Vapor cloud — multi-layer -->
  <ellipse cx="240" cy="100" rx="200" ry="90" fill="url(#fh-vapor)" opacity="0.9"/>
  <circle cx="120" cy="80" r="55" fill="url(#fh-vapor)" opacity="0.7"/>
  <circle cx="340" cy="60" r="62" fill="url(#fh-vapor)" opacity="0.65"/>
  <circle cx="400" cy="120" r="48" fill="url(#fh-vapor)" opacity="0.55"/>
  <circle cx="80"  cy="140" r="42" fill="url(#fh-vapor)" opacity="0.55"/>
  <circle cx="180" cy="40"  r="32" fill="url(#fh-vapor)" opacity="0.6"/>
  <circle cx="280" cy="30"  r="28" fill="url(#fh-vapor)" opacity="0.55"/>

  <!-- Vapor tendrils -->
  <path d="M180 180 q60 -40 120 0" stroke="rgba(240,240,250,0.35)" stroke-width="6" fill="none" stroke-linecap="round"/>
  <path d="M150 200 q90 -30 180 0" stroke="rgba(240,240,250,0.25)" stroke-width="4" fill="none" stroke-linecap="round"/>

  <!-- Mouthpiece -->
  <rect x="200" y="190" width="80" height="32" rx="9" fill="#0A0A0A"/>
  <rect x="206" y="184" width="68" height="12" rx="6" fill="#262626"/>

  <!-- Atomizer ring -->
  <rect x="190" y="222" width="100" height="10" rx="3" fill="#0A0A0A" stroke="#C8A96E" stroke-width="0.8"/>

  <!-- Body -->
  <rect x="148" y="232" width="184" height="346" rx="34" fill="url(#fh-body)"/>
  <!-- Vertical highlight -->
  <rect x="158" y="240" width="22" height="330" rx="10" fill="url(#fh-shine)"/>

  <!-- Display panel -->
  <rect x="170" y="260" width="140" height="120" rx="10" fill="#0A0A0A" stroke="#C8A96E" stroke-width="1"/>
  <text x="240" y="316" font-family="Arial Black, sans-serif" font-size="26" font-weight="900" fill="#C8A96E" text-anchor="middle" letter-spacing="6">LEGEND VAPE STORE</text>
  <text x="240" y="338" font-family="Arial, sans-serif" font-size="9" font-weight="700" fill="rgba(200,169,110,0.7)" text-anchor="middle" letter-spacing="5">PREMIUM VAPOR</text>
  <line x1="190" y1="350" x2="290" y2="350" stroke="rgba(200,169,110,0.5)" stroke-width="0.8"/>
  <text x="240" y="368" font-family="Arial, sans-serif" font-size="8" fill="rgba(200,169,110,0.55)" text-anchor="middle" letter-spacing="3">FUEL · 100%</text>

  <!-- Black bands / ribs -->
  <rect x="160" y="396" width="160" height="6"  rx="2" fill="#0A0A0A"/>
  <rect x="160" y="416" width="160" height="6"  rx="2" fill="#0A0A0A"/>
  <rect x="160" y="436" width="160" height="6"  rx="2" fill="#0A0A0A"/>

  <!-- Fire button -->
  <circle cx="240" cy="478" r="22" fill="#0A0A0A" stroke="#C8A96E" stroke-width="1.6"/>
  <circle cx="240" cy="478" r="14" fill="#1A1A1A"/>
  <circle cx="240" cy="478" r="5" fill="#E8C84A" opacity="0.9"/>

  <!-- Bottom plate -->
  <rect x="170" y="520" width="140" height="44" rx="6" fill="#1A1A1A"/>
  <text x="240" y="550" font-family="Arial Black, sans-serif" font-size="14" font-weight="900" fill="#C8A96E" text-anchor="middle" letter-spacing="6">VAPOR + CLARITY</text>

  <!-- Liquid pour-out splash on the right side -->
  <path d="M310 360 q60 0 80 60 q-30 30 -70 10 q-26 -14 -10 -70 z" fill="rgba(200,169,110,0.7)"/>
  <ellipse cx="380" cy="440" rx="18" ry="6" fill="rgba(200,169,110,0.55)"/>
  <ellipse cx="406" cy="460" rx="10" ry="4" fill="rgba(200,169,110,0.45)"/>

  <!-- Floor reflection -->
  <ellipse cx="240" cy="606" rx="160" ry="10" fill="rgba(0,0,0,0.4)" filter="url(#fh-blur)"/>
</svg>
