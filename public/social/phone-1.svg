  <rect x="208" y="296" width="20" height="40" rx="3" fill="rgba(255,255,255,0.35)" transform="rotate(15 218 320)"/>

  <!-- Vapor curls -->
  <path d="M260 240 q40 -30 50 -10 q-20 30 -50 10 z" fill="rgba(255,255,255,0.5)"/>
  <path d="M280 200 q30 -20 36 -4 q-14 22 -36 4 z" fill="rgba(255,255,255,0.4)"/>
  <path d="M290 160 q22 -16 26 -4 q-10 16 -26 4 z" fill="rgba(255,255,255,0.3)"/>

  <!-- TikTok-style sidebar -->
  <g transform="translate(310 360)">
    <circle cx="0" cy="0" r="20" fill="rgba(0,0,0,0.35)" stroke="#F0EDE8" stroke-width="1.5"/>
    <text x="0" y="48" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#F0EDE8" text-anchor="middle">12K</text>
    <path d="M-8 -2 q0 -6 6 -6 q4 0 6 4 q2 -4 6 -4 q6 0 6 6 q0 8 -12 14 q-12 -6 -12 -14 z" fill="#F0EDE8" transform="translate(0 0)"/>
  </g>
  <g transform="translate(310 430)">
    <circle cx="0" cy="0" r="20" fill="rgba(0,0,0,0.35)" stroke="#F0EDE8" stroke-width="1.5"/>
    <text x="0" y="48" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#F0EDE8" text-anchor="middle">348</text>
    <path d="M-8 -8 h16 v12 h-12 l-4 4 z" fill="#F0EDE8"/>
  </g>
  <g transform="translate(310 500)">
    <circle cx="0" cy="0" r="20" fill="rgba(0,0,0,0.35)" stroke="#F0EDE8" stroke-width="1.5"/>
    <text x="0" y="48" font-family="Arial Black, sans-serif" font-size="10" font-weight="900" fill="#F0EDE8" text-anchor="middle">SHARE</text>
    <path d="M-6 0 l8 -8 v4 h6 v8 h-6 v4 z" fill="#F0EDE8"/>
  </g>

  <!-- Caption block -->
  <rect x="20" y="600" width="260" height="2" fill="rgba(255,255,255,0.4)"/>
  <text x="20" y="630" font-family="Arial Black, sans-serif" font-size="18" font-weight="900" fill="#F0EDE8" letter-spacing="1">@nikitaa.x</text>
  <text x="20" y="654" font-family="Arial, sans-serif" font-size="13" fill="#F0EDE8" opacity="0.92">smooth as anything 🔥</text>
  <text x="20" y="676" font-family="Arial, sans-serif" font-size="12" fill="#F0EDE8" opacity="0.7" font-style="italic">#vapewithlegendvapestore #premium</text>

  <!-- Logo watermark -->
  <text x="340" y="704" font-family="Arial Black, sans-serif" font-size="11" font-weight="900" fill="rgba(240,237,232,0.4)" text-anchor="end" letter-spacing="2">LEGEND VAPE STORE</text>
