<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 720" width="360" height="720">
  <defs>
    <linearGradient id="ph1-bg" x1="0" x2="0.5" y1="0" y2="1">
      <stop offset="0" stop-color="#FF7A92"/>
      <stop offset="0.5" stop-color="#C8273A"/>
      <stop offset="1" stop-color="#3A0810"/>
    </linearGradient>
    <radialGradient id="ph1-glow" cx="0.5" cy="0.4" r="0.5">
      <stop offset="0" stop-color="rgba(255,200,210,0.5)"/>
      <stop offset="1" stop-color="rgba(0,0,0,0)"/>
    </radialGradient>
  </defs>
  <rect width="360" height="720" fill="url(#ph1-bg)"/>
  <rect width="360" height="720" fill="url(#ph1-glow)"/>

  <!-- Status bar -->
  <text x="20" y="36" font-family="Arial Black, sans-serif" font-size="13" font-weight="900" fill="#F0EDE8" letter-spacing="1.5">9:41</text>
  <rect x="304" y="22" width="36" height="14" rx="3" fill="rgba(240,237,232,0.85)"/>
  <rect x="306" y="24" width="28" height="10" rx="1" fill="rgba(0,0,0,0.5)"/>
  <text x="282" y="36" font-family="Arial, sans-serif" font-size="11" fill="#F0EDE8">5G</text>

  <!-- Subject silhouette -->
  <ellipse cx="180" cy="240" rx="80" ry="92" fill="rgba(255,180,190,0.55)"/>
  <ellipse cx="180" cy="160" rx="44" ry="52" fill="#F4C9A6"/>
  <path d="M140 130 q40 -50 80 0 q4 40 -40 50 q-44 -10 -40 -50 z" fill="#3A2014"/>
  <path d="M148 200 q32 14 64 0 l-2 80 q-30 14 -60 0 z" fill="#F4C9A6"/>

  <!-- Device in hand -->
